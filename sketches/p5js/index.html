<!doctype html>
<html lang="fr">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Genuary — Dessins géométriques</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&display=swap"
            rel="stylesheet"
        />
        <style>
            /* ── LOADER ──────────────────────────────────────────── */
            .loader {
                position: fixed;
                inset: 0;
                z-index: 1000;
                background: #0a0a0a;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                overflow: hidden;
                transition: transform 0.85s cubic-bezier(0.76, 0, 0.24, 1);
                will-change: transform;
            }

            .loader--exit {
                transform: translateY(-100%);
            }

            .loader__title {
                font-family: 'Outfit', system-ui, sans-serif;
                font-size: clamp(4.5rem, 20vw, 16rem);
                font-weight: 900;
                letter-spacing: -0.05em;
                line-height: 1;
                text-transform: uppercase;
                color: #ffffff;
                user-select: none;
                opacity: 0;
                transform: translateY(28px);
                transition: opacity 0.55s ease-out, transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
            }

            .loader__title--visible {
                opacity: 1;
                transform: translateY(0);
            }

            .loader__counter {
                font-family: 'Outfit', system-ui, sans-serif;
                font-size: clamp(1.1rem, 3.5vw, 2.2rem);
                font-weight: 800;
                letter-spacing: 0.12em;
                color: #c41e3a;
                margin-top: 1.2rem;
                font-variant-numeric: tabular-nums;
                user-select: none;
                min-width: 3ch;
                text-align: center;
                opacity: 0;
                transition: opacity 0.3s ease-out;
            }

            .loader__counter--visible {
                opacity: 1;
            }

            .loader__bar-wrap {
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 3px;
                background: rgba(255, 255, 255, 0.06);
            }

            .loader__bar {
                height: 100%;
                width: 0%;
                background: #c41e3a;
            }
        </style>
    </head>
    <body>
        <!-- ── LOADING SCREEN ───────────────────────────────────── -->
        <div class="loader" id="loader" aria-hidden="true">
            <span class="loader__title" id="loader-title">Genuary</span>
            <span class="loader__counter" id="loader-counter">01</span>
            <div class="loader__bar-wrap">
                <div class="loader__bar" id="loader-bar"></div>
            </div>
        </div>

        <div class="viewport">
            <header class="studio-name" aria-label="Nom du studio">
                <span class="studio-name__text">Genuary</span>
            </header>

            <main class="list-scroll" id="list-scroll" role="main" aria-label="Liste des projets">
                <ul class="project-list" id="project-list"></ul>
            </main>

            <aside class="corner-preview" aria-label="Aperçu du projet actif">
                <div class="preview-thumb-frames" id="preview-thumb-frames">
                    <div class="preview-thumb-layer preview-thumb-layer--visible" id="thumb-layer-0">
                        <iframe title="Aperçu du projet" src="about:blank"></iframe>
                    </div>
                    <div class="preview-thumb-layer" id="thumb-layer-1">
                        <iframe title="Aperçu du projet" src="about:blank"></iframe>
                    </div>
                </div>
            </aside>

            <a
                href="#"
                class="chatbot-trigger"
                id="chatbot-trigger"
                aria-label="Ouvrir le chatbot"
                aria-expanded="false"
                aria-haspopup="dialog"
            >
                Chatbot
            </a>
        </div>

        <div
            class="chatbot-modal"
            id="chatbot-modal"
            role="dialog"
            aria-modal="true"
            aria-labelledby="chatbot-title"
            hidden
        >
            <div class="chatbot-modal-backdrop" id="chatbot-backdrop"></div>
            <div class="chatbot-modal-panel">
                <div class="chatbot-modal-header">
                    <h2 class="chatbot-modal-title" id="chatbot-title">Chatbot No-AI</h2>
                    <button
                        type="button"
                        class="chatbot-modal-close"
                        id="chatbot-close"
                        aria-label="Fermer le chatbot"
                    >
                        ×
                    </button>
                </div>
                <iframe class="chatbot-iframe" src="about:blank" title="Chatbot No-AI"></iframe>
            </div>
        </div>

        <script>
            /* ── LOADER ──────────────────────────────────────────── */
            (function () {
                var loader  = document.getElementById('loader');
                var title   = document.getElementById('loader-title');
                var counter = document.getElementById('loader-counter');
                var bar     = document.getElementById('loader-bar');
                var TOTAL   = 31;
                var STEP_MS = 42;   /* ms per jour — 31 × 42 ≈ 1.3 s */
                var day     = 0;

                function pad(n) { return n < 10 ? '0' + n : String(n); }

                /* 1 — title appears */
                requestAnimationFrame(function () {
                    requestAnimationFrame(function () {
                        title.classList.add('loader__title--visible');
                    });
                });

                /* 2 — counter starts after title transition (≈ 320 ms) */
                setTimeout(function () {
                    counter.classList.add('loader__counter--visible');

                    (function tick() {
                        day++;
                        counter.textContent = pad(day);
                        bar.style.width = (day / TOTAL * 100) + '%';

                        if (day < TOTAL) {
                            setTimeout(tick, STEP_MS);
                        } else {
                            /* 3 — brief hold, then slide up */
                            setTimeout(function () {
                                loader.classList.add('loader--exit');
                                loader.addEventListener('transitionend', function () {
                                    loader.style.display = 'none';
                                }, { once: true });
                            }, 180);
                        }
                    })();
                }, 320);
            })();

            (function () {
                const TITLES = {
                    1: "One color, one shape",
                    2: "Squash & Stretch",
                    3: "Fibonacci forever",
                    4: "Lowres",
                    5: 'Write "Genuary" (no font)',
                    6: "Lights on/off",
                    7: "Jour 7",
                    8: "Jour 8",
                    9: "Jour 9",
                    10: "Jour 10",
                    11: "Jour 11",
                    12: "Jour 12",
                    13: "Jour 13",
                    14: "Jour 14",
                    15: "Jour 15",
                    16: "Jour 16",
                    17: "Jour 17",
                    18: "Jour 18",
                    19: "Jour 19",
                    20: "Jour 20",
                    21: "Jour 21",
                    22: "Jour 22",
                    23: "Jour 23",
                    24: "Jour 24",
                    25: "Jour 25",
                    26: "Jour 26",
                    27: "Jour 27",
                    28: "HTML only",
                    29: "Jour 29",
                    30: "Jour 30",
                    31: "GLSL day",
                };

                const listEl = document.getElementById("project-list");
                const listScroll = document.getElementById("list-scroll");
                const cornerPreview = document.querySelector(".corner-preview");
                const thumbLayer0 = document.getElementById("thumb-layer-0");
                const thumbLayer1 = document.getElementById("thumb-layer-1");
                const thumbIframes = [
                    thumbLayer0.querySelector("iframe"),
                    thumbLayer1.querySelector("iframe"),
                ];

                let currentThumbLayer = 0;
                let activeDay = 0;

                for (let day = 1; day <= 31; day++) {
                    const slug = encodeURIComponent(day + " janvier");
                    const href = "sketches/" + slug + "/index.html";
                    const title = TITLES[day] || "Jour " + day;
                    const li = document.createElement("li");
                    li.className = "project-item";
                    li.innerHTML =
                        '<a href="' +
                        href +
                        '" class="project-link" data-day="' +
                        day +
                        '">' +
                        title.toUpperCase() +
                        "</a>";
                    listEl.appendChild(li);
                }

                const items = Array.from(listEl.querySelectorAll(".project-item"));
                const links = Array.from(listEl.querySelectorAll(".project-link"));

                function updateBlurForHover(day) {
                    items.forEach(function (item, i) {
                        const d = parseInt(links[i].getAttribute("data-day"), 10);
                        if (d === day) {
                            item.style.setProperty("--blur", "0px");
                            item.style.setProperty("--opacity", "1");
                        } else {
                            item.style.setProperty("--blur", "10px");
                            item.style.setProperty("--opacity", "0.45");
                        }
                    });
                }

                function resetBlur() {
                    items.forEach(function (item) {
                        item.style.setProperty("--blur", "0px");
                        item.style.setProperty("--opacity", "1");
                    });
                }

                function updateThumb(day) {
                    const slug = encodeURIComponent(day + " janvier");
                    const href = "sketches/" + slug + "/index.html";
                    const nextLayer = 1 - currentThumbLayer;
                    thumbIframes[nextLayer].src = href;
                    thumbLayer0.classList.toggle("preview-thumb-layer--visible", nextLayer === 0);
                    thumbLayer1.classList.toggle("preview-thumb-layer--visible", nextLayer === 1);
                    currentThumbLayer = nextLayer;
                }

                function hideThumb() {
                    cornerPreview.classList.remove("corner-preview--visible");
                    thumbIframes[0].src = "about:blank";
                    thumbIframes[1].src = "about:blank";
                    currentThumbLayer = 0;
                }

                links.forEach(function (link) {
                    const day = parseInt(link.getAttribute("data-day"), 10);
                    link.addEventListener("mouseenter", function () {
                        activeDay = day;
                        updateBlurForHover(activeDay);
                        updateThumb(activeDay);
                        cornerPreview.classList.add("corner-preview--visible");
                    });
                    link.addEventListener("focus", function () {
                        activeDay = day;
                        updateBlurForHover(activeDay);
                        updateThumb(activeDay);
                        cornerPreview.classList.add("corner-preview--visible");
                    });
                });

                listScroll.addEventListener("mouseleave", function () {
                    activeDay = 0;
                    resetBlur();
                    hideThumb();
                });
            })();

            (function () {
                var trigger = document.getElementById("chatbot-trigger");
                var modal = document.getElementById("chatbot-modal");
                var backdrop = document.getElementById("chatbot-backdrop");
                var closeBtn = document.getElementById("chatbot-close");
                var iframe = document.querySelector(".chatbot-iframe");

                function openChatbot(e) {
                    e.preventDefault();
                    modal.hidden = false;
                    trigger.setAttribute("aria-expanded", "true");
                    iframe.src = "chatbot/index.html";
                    document.body.style.overflow = "hidden";
                    requestAnimationFrame(function () {
                        requestAnimationFrame(function () {
                            modal.classList.add("chatbot-modal--open");
                        });
                    });
                }

                function closeChatbot() {
                    var panel = modal.querySelector(".chatbot-modal-panel");
                    modal.classList.remove("chatbot-modal--open");
                    panel.addEventListener(
                        "transitionend",
                        function () {
                            modal.hidden = true;
                            iframe.src = "about:blank";
                            document.body.style.overflow = "";
                            trigger.setAttribute("aria-expanded", "false");
                        },
                        { once: true }
                    );
                }

                trigger.addEventListener("click", openChatbot);
                closeBtn.addEventListener("click", closeChatbot);
                backdrop.addEventListener("click", closeChatbot);

                document.addEventListener("keydown", function (e) {
                    if (
                        e.key === "Escape" &&
                        !modal.hidden &&
                        modal.classList.contains("chatbot-modal--open")
                    )
                        closeChatbot();
                });
            })();
        </script>
    </body>
</html>
